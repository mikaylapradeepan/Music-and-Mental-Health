<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music & Mental Health Analysis</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="container py-4">

    <div class="row">
        <div class="col-md-12">
            <h1 class="mb-4">Music Listening Habits vs. Anxiety</h1>
            <p class="text-muted">Explore how daily listening hours affect anxiety levels across different genres and whether being an instrumentalist makes a difference.</p>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <label for="select-genre" class="form-label">Filter by Favorite Genre:</label>
            <select id="select-genre" class="form-select">
                <option value="All">All Genres</option>
                <option value="Classical">Classical</option>
                <option value="Country">Country</option>
                <option value="EDM">EDM</option>
                <option value="Folk">Folk</option>
                <option value="Gospel">Gospel</option>
                <option value="Hip hop">Hip hop</option>
                <option value="Jazz">Jazz</option>
                <option value="K pop">K pop</option>
                <option value="Latin">Latin</option>
                <option value="Lofi">Lofi</option>
                <option value="Metal">Metal</option>
                <option value="Pop">Pop</option>
                <option value="R&B">R&B</option>
                <option value="Rap">Rap</option>
                <option value="Rock">Rock</option>
                <option value="Video game music">Video game music</option>
            </select>
        </div>

        <div class="col-md-4">
            <label for="select-metric" class="form-label">Select Mental Health Metric:</label>
            <select id="select-metric" class="form-select">
                <option value="Anxiety">Anxiety</option>
                <option value="Insomnia">Insomnia</option>
                <option value="Depression">Depression</option>
                <option value="OCD">OCD</option>
            </select>
        </div>
    </div>

    

    <div class="row">
        <div class="col-md-12">
            <div id="chart-area" style="background-color: #f8f9fa; border-radius: 8px; border: 1px solid #dee2e6;"></div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/chart.js"></script> 
    <script src="js/main.js"></script>
    
</body>
</html>
